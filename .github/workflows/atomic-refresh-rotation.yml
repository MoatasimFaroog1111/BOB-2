name: Atomic refresh rotation

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: atomic-refresh-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  atomic-refresh-rotation:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: BOB-2/backend
    env:
      APP_ENV: test
      DATABASE_URL: sqlite:///./ci-atomic-refresh.db
      SECRET_KEY: ci-only-secret-key-that-is-longer-than-thirty-two-characters
      SECRET_STORE_PROVIDER: memory
      LOCAL_LLM_ENABLED: "false"
      EXTERNAL_LLM_ENABLED: "false"
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: BOB-2/backend/requirements.lock
      - name: Install hash-locked dependencies
        run: pip install --quiet --require-hashes -r requirements.lock
      - name: Compile rotation paths
        run: >-
          python -m compileall -q
          app/models/session_security.py
          app/security/auth.py
          app/services/refresh_token_rotation.py
          app/api/v1/auth.py
          migrations/versions/a8c4e1f2d670_add_atomic_refresh_rotation.py
          scripts/check_atomic_refresh_rotation.py
          tests/test_auth.py
          tests/test_atomic_refresh_rotation.py
      - name: Enforce atomic refresh source boundaries
        run: python scripts/check_atomic_refresh_rotation.py
      - name: Run atomic rotation and replay regressions
        run: >-
          pytest -q
          tests/test_auth.py
          tests/test_atomic_refresh_rotation.py
          tests/test_live_role_session_security.py
