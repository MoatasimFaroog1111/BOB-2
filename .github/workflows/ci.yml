name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-lint:
    name: Backend — Lint & Import Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: BOB-2/backend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: BOB-2/backend/requirements.lock
      - name: Install hash-locked dependencies
        run: pip install --quiet --require-hashes -r requirements.lock
      - name: Check imports resolve
        env:
          APP_ENV: test
          SECRET_KEY: ci-only-secret-key-that-is-longer-than-thirty-two-characters
        run: python -c "from app.core.config import settings; print('Config OK:', settings.APP_NAME)"
      - name: Check main app imports
        env:
          APP_ENV: test
          SECRET_KEY: ci-only-secret-key-that-is-longer-than-thirty-two-characters
        run: python -c "from app.main import app; print('FastAPI app OK')"

  backend-erp-outbound-test:
    name: Backend — ERP Outbound SSRF Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: BOB-2/backend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: BOB-2/backend/requirements.lock
      - name: Install hash-locked dependencies
        run: pip install --quiet --require-hashes -r requirements.lock
      - name: Run ERP outbound policy and DNS-pinning tests
        env:
          APP_ENV: test
          DATABASE_URL: sqlite:///./test-erp-outbound.db
          SECRET_KEY: ci-only-secret-key-that-is-longer-than-thirty-two-characters
        run: python -m pytest tests/test_erp_outbound_security.py -q

  backend-external-llm-test:
    name: Backend — External LLM Consent Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: BOB-2/backend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: BOB-2/backend/requirements.lock
      - name: Install hash-locked dependencies
        run: pip install --quiet --require-hashes -r requirements.lock
      - name: Run tenant consent, DPA, redaction, audit, and egress tests
        env:
          APP_ENV: test
          DATABASE_URL: sqlite:///./test-external-llm.db
          SECRET_KEY: ci-only-secret-key-that-is-longer-than-thirty-two-characters
          LOCAL_LLM_ENABLED: "false"
          EXTERNAL_LLM_ENABLED: "false"
        run: python -m pytest tests/test_external_llm_security.py -q

  backend-telegram-download-test:
    name: Backend — Telegram Download Boundary Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: BOB-2/backend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: BOB-2/backend/requirements.lock
      - name: Install hash-locked dependencies
        run: pip install --quiet --require-hashes -r requirements.lock
      - name: Run path, size, redirect, and streaming tests
        env:
          APP_ENV: test
          DATABASE_URL: sqlite:///./test-ingestion-download.db
          SECRET_KEY: ci-only-secret-key-that-is-longer-than-thirty-two-characters
        run: >-
          python -m pytest tests/test_telegram_ingestion_security.py -q
          -k "remote_path or declared_size or job_validation or api_response or bounded_download"

  backend-telegram-queue-test:
    name: Backend — Telegram Queue Limit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: BOB-2/backend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: BOB-2/backend/requirements.lock
      - name: Install hash-locked dependencies
        run: pip install --quiet --require-hashes -r requirements.lock
      - name: Run queue, rate, TTL, and worker tests
        env:
          APP_ENV: test
          DATABASE_URL: sqlite:///./test-ingestion-queue.db
          SECRET_KEY: ci-only-secret-key-that-is-longer-than-thirty-two-characters
        run: >-
          python -m pytest tests/test_telegram_ingestion_security.py -q
          -k "queue_enforces or expired_queue_job or worker_failure or queue_starts"

  backend-telegram-cleanup-test:
    name: Backend — Telegram Cleanup Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: BOB-2/backend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: BOB-2/backend/requirements.lock
      - name: Install hash-locked dependencies
        run: pip install --quiet --require-hashes -r requirements.lock
      - name: Run fail-closed legacy and expiry cleanup tests
        env:
          APP_ENV: test
          DATABASE_URL: sqlite:///./test-ingestion-cleanup.db
          SECRET_KEY: ci-only-secret-key-that-is-longer-than-thirty-two-characters
        run: >-
          python -m pytest tests/test_telegram_ingestion_security.py -q
          -k "legacy_direct or expired_approval_cleanup or bot_source"

  backend-telegram-approval-test:
    name: Backend — Telegram One-Time Approval Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: BOB-2/backend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: BOB-2/backend/requirements.lock
      - name: Install hash-locked dependencies
        run: pip install --quiet --require-hashes -r requirements.lock
      - name: Run one-time approval regression tests
        env:
          APP_ENV: test
          DATABASE_URL: sqlite:///./test-approval.db
          SECRET_KEY: ci-only-secret-key-that-is-longer-than-thirty-two-characters
        run: python -m pytest tests/test_telegram_accounting_approvals.py -q

  backend-telegram-authorization-test:
    name: Backend — Telegram Identity Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: BOB-2/backend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: BOB-2/backend/requirements.lock
      - name: Install hash-locked dependencies
        run: pip install --quiet --require-hashes -r requirements.lock
      - name: Run Telegram identity regression tests
        env:
          APP_ENV: test
          DATABASE_URL: sqlite:///./test-authorization.db
          SECRET_KEY: ci-only-secret-key-that-is-longer-than-thirty-two-characters
        run: python -m pytest tests/test_telegram_authorization.py -q

  backend-test:
    name: Backend — Full Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: BOB-2/backend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: BOB-2/backend/requirements.lock
      - name: Install hash-locked dependencies
        run: pip install --quiet --require-hashes -r requirements.lock
      - name: Run tests with actionable failure tail
        env:
          APP_ENV: test
          DATABASE_URL: sqlite:///./test.db
          SECRET_KEY: ci-only-secret-key-that-is-longer-than-thirty-two-characters
          SECRET_STORE_PROVIDER: memory
          LOCAL_LLM_ENABLED: "false"
          EXTERNAL_LLM_ENABLED: "false"
        run: |
          set +e
          python -m pytest tests/ -q --tb=short > pytest-full.log 2>&1
          status=$?
          if [ "$status" -ne 0 ]; then
            tail -n 220 pytest-full.log
            exit "$status"
          fi
          cat pytest-full.log

  frontend-lint:
    name: Frontend — Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: BOB-2/frontend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: BOB-2/frontend/package-lock.json
      - name: Install locked dependencies
        run: npm ci --ignore-scripts
      - name: Lint
        run: npm run lint
      - name: Build
        env:
          NEXT_PUBLIC_API_BASE_URL: https://api.example.invalid
        run: npm run build
