name: Generate hashed Python lock

on:
  push:
    branches:
      - agent/security-hardening-bob2
    paths:
      - .github/workflows/generate-python-lock.yml

permissions:
  contents: write

jobs:
  generate-lock:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/security-hardening-bob2
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Generate fully pinned hash-checked lock
        working-directory: BOB-2/backend
        run: |
          python -m pip install --quiet --upgrade pip
          pip install --quiet pip-tools==7.5.3 pip-audit==2.9.0
          pip-compile \
            --resolver=backtracking \
            --generate-hashes \
            --allow-unsafe \
            --output-file=requirements.lock \
            requirements.txt
          pip install --dry-run --require-hashes -r requirements.lock
          pip-audit -r requirements.lock --strict
      - name: Commit lockfile
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add BOB-2/backend/requirements.lock
          git commit -m "add hash-locked Python dependency graph"
          git push origin HEAD:agent/security-hardening-bob2
