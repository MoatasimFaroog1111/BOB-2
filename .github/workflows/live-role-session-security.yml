name: Live role session security

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: live-role-session-security-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  live-role-session-security:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: BOB-2/backend
    env:
      APP_ENV: test
      DATABASE_URL: sqlite:///./ci-live-role-session.db
      SECRET_KEY: ci-only-secret-key-that-is-longer-than-thirty-two-characters
      SECRET_STORE_PROVIDER: memory
      LOCAL_LLM_ENABLED: "false"
      EXTERNAL_LLM_ENABLED: "false"
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: BOB-2/backend/requirements.lock
      - name: Install hash-locked dependencies
        run: pip install --quiet --require-hashes -r requirements.lock
      - name: Compile authorization and session paths
        run: >-
          python -m compileall -q
          app/models/core.py
          app/security/auth.py
          app/security/dependencies.py
          app/api/v1/auth.py
          migrations/versions/f3a9d2c7b410_add_live_role_session_security.py
          scripts/check_live_role_session_security.py
          tests/test_auth.py
          tests/test_live_role_session_security.py
      - name: Enforce live-role source boundaries
        run: python scripts/check_live_role_session_security.py
      - name: Run authentication and session revocation regressions
        run: >-
          pytest -q
          tests/test_auth.py
          tests/test_live_role_session_security.py
