name: Database migrations

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: migrations-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  migration-round-trip:
    name: Alembic — Upgrade, Downgrade, Upgrade
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: BOB-2/backend
    env:
      APP_ENV: test
      DATABASE_URL: sqlite:///./ci-migrations.db
      SECRET_KEY: ci-only-secret-key-that-is-longer-than-thirty-two-characters
      LOCAL_LLM_ENABLED: "false"
      EXTERNAL_LLM_ENABLED: "false"
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: BOB-2/backend/requirements.lock
      - name: Install hash-locked dependencies
        run: pip install --quiet --require-hashes -r requirements.lock
      - name: Verify one Alembic head
        run: |
          test "$(alembic heads | grep -c '(head)')" -eq 1
          alembic heads | grep '7a4c9e2d1f60'
      - name: Upgrade to external LLM policy migration
        run: |
          rm -f ci-migrations.db
          alembic upgrade head
          python - <<'PY'
          import sqlite3

          connection = sqlite3.connect("ci-migrations.db")
          try:
              tables = {
                  row[0]
                  for row in connection.execute(
                      "SELECT name FROM sqlite_master WHERE type='table'"
                  )
              }
              assert "external_llm_policies" in tables
              revision = connection.execute(
                  "SELECT version_num FROM alembic_version"
              ).fetchone()[0]
              assert revision == "7a4c9e2d1f60"
              columns = {
                  row[1]
                  for row in connection.execute(
                      "PRAGMA table_info(external_llm_policies)"
                  )
              }
              required = {
                  "organization_id",
                  "external_llm_enabled",
                  "approved_provider",
                  "approved_model",
                  "allowed_purposes",
                  "allow_redacted_document_text",
                  "allow_financial_values",
                  "max_redacted_text_chars",
                  "dpa_version",
                  "dpa_reference",
                  "data_residency_region",
                  "provider_retention_mode",
                  "accepted_by_user_id",
                  "accepted_at",
                  "revoked_by_user_id",
                  "revoked_at",
                  "policy_version",
              }
              assert required.issubset(columns), required - columns
          finally:
              connection.close()
          PY
      - name: Downgrade and verify policy table removal
        run: |
          alembic downgrade 5d2e8f1c3a70
          python - <<'PY'
          import sqlite3

          connection = sqlite3.connect("ci-migrations.db")
          try:
              tables = {
                  row[0]
                  for row in connection.execute(
                      "SELECT name FROM sqlite_master WHERE type='table'"
                  )
              }
              assert "external_llm_policies" not in tables
              revision = connection.execute(
                  "SELECT version_num FROM alembic_version"
              ).fetchone()[0]
              assert revision == "5d2e8f1c3a70"
          finally:
              connection.close()
          PY
      - name: Re-upgrade and verify final head
        run: |
          alembic upgrade head
          python - <<'PY'
          import sqlite3

          connection = sqlite3.connect("ci-migrations.db")
          try:
              revision = connection.execute(
                  "SELECT version_num FROM alembic_version"
              ).fetchone()[0]
              assert revision == "7a4c9e2d1f60"
              indexes = {
                  row[1]
                  for row in connection.execute(
                      "PRAGMA index_list(external_llm_policies)"
                  )
              }
              assert "uq_external_llm_policies_organization" in indexes
          finally:
              connection.close()
          PY
