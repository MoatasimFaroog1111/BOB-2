name: Database migrations

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: migrations-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  migration-round-trip:
    name: Alembic — Upgrade, Downgrade, Upgrade
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: BOB-2/backend
    env:
      APP_ENV: test
      DATABASE_URL: sqlite:///./ci-migrations.db
      SECRET_KEY: ci-only-secret-key-that-is-longer-than-thirty-two-characters
      SECRET_STORE_PROVIDER: memory
      LOCAL_LLM_ENABLED: "false"
      EXTERNAL_LLM_ENABLED: "false"
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: BOB-2/backend/requirements.lock
      - name: Install hash-locked dependencies
        run: pip install --quiet --require-hashes -r requirements.lock
      - name: Verify one Alembic head
        run: |
          test "$(alembic heads | grep -c '(head)')" -eq 1
          alembic heads | grep '9c7f2a4b1d80'
      - name: Upgrade to tenant secret metadata migration
        run: |
          rm -f ci-migrations.db
          alembic upgrade head
          python - <<'PY'
          import sqlite3

          connection = sqlite3.connect("ci-migrations.db")
          try:
              tables = {
                  row[0]
                  for row in connection.execute(
                      "SELECT name FROM sqlite_master WHERE type='table'"
                  )
              }
              assert "external_llm_policies" in tables
              assert "tenant_secret_bindings" in tables
              assert "tenant_secret_versions" in tables
              revision = connection.execute(
                  "SELECT version_num FROM alembic_version"
              ).fetchone()[0]
              assert revision == "9c7f2a4b1d80"
              binding_columns = {
                  row[1]
                  for row in connection.execute(
                      "PRAGMA table_info(tenant_secret_bindings)"
                  )
              }
              required_binding = {
                  "organization_id",
                  "purpose",
                  "provider",
                  "secret_name",
                  "current_version",
                  "status",
                  "fingerprint_sha256",
                  "created_by_user_id",
                  "rotated_by_user_id",
                  "revoked_by_user_id",
                  "last_rotated_at",
                  "revoked_at",
              }
              assert required_binding.issubset(binding_columns), required_binding - binding_columns
              version_columns = {
                  row[1]
                  for row in connection.execute(
                      "PRAGMA table_info(tenant_secret_versions)"
                  )
              }
              required_version = {
                  "binding_id",
                  "organization_id",
                  "purpose",
                  "provider",
                  "secret_name",
                  "version",
                  "fingerprint_sha256",
                  "status",
                  "created_by_user_id",
                  "superseded_at",
                  "revoked_at",
              }
              assert required_version.issubset(version_columns), required_version - version_columns
          finally:
              connection.close()
          PY
      - name: Downgrade and verify secret metadata removal
        run: |
          alembic downgrade 7a4c9e2d1f60
          python - <<'PY'
          import sqlite3

          connection = sqlite3.connect("ci-migrations.db")
          try:
              tables = {
                  row[0]
                  for row in connection.execute(
                      "SELECT name FROM sqlite_master WHERE type='table'"
                  )
              }
              assert "tenant_secret_bindings" not in tables
              assert "tenant_secret_versions" not in tables
              assert "external_llm_policies" in tables
              revision = connection.execute(
                  "SELECT version_num FROM alembic_version"
              ).fetchone()[0]
              assert revision == "7a4c9e2d1f60"
          finally:
              connection.close()
          PY
      - name: Re-upgrade and verify tenant uniqueness
        run: |
          alembic upgrade head
          python - <<'PY'
          import sqlite3

          connection = sqlite3.connect("ci-migrations.db")
          try:
              revision = connection.execute(
                  "SELECT version_num FROM alembic_version"
              ).fetchone()[0]
              assert revision == "9c7f2a4b1d80"

              unique_binding = False
              for index_row in connection.execute(
                  "PRAGMA index_list(tenant_secret_bindings)"
              ):
                  if not bool(index_row[2]):
                      continue
                  index_name = index_row[1]
                  columns = [
                      row[2]
                      for row in connection.execute(
                          f"PRAGMA index_info('{index_name}')"
                      )
                  ]
                  if columns == ["organization_id", "purpose"]:
                      unique_binding = True
                      break
              assert unique_binding, "one secret binding per organization and purpose is required"
          finally:
              connection.close()
          PY
