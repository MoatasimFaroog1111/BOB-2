name: Database migrations

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: migrations-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  migration-round-trip:
    name: Alembic — Upgrade, Downgrade, Upgrade
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: BOB-2/backend
    env:
      APP_ENV: test
      DATABASE_URL: sqlite:///./ci-migrations.db
      SECRET_KEY: ci-only-secret-key-that-is-longer-than-thirty-two-characters
      SECRET_STORE_PROVIDER: memory
      LOCAL_LLM_ENABLED: "false"
      EXTERNAL_LLM_ENABLED: "false"
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: BOB-2/backend/requirements.lock
      - name: Install hash-locked dependencies
        run: pip install --quiet --require-hashes -r requirements.lock
      - name: Verify one Alembic head
        run: |
          test "$(alembic heads | grep -c '(head)')" -eq 1
          alembic heads | grep 'e8b3c0f6a142'
      - name: Prepare parent schema with legacy audit data
        run: |
          rm -f ci-migrations.db
          alembic upgrade a8c4e1f2d670
          python - <<'PY'
          import sqlite3

          connection = sqlite3.connect("ci-migrations.db")
          try:
              connection.execute(
                  """
                  INSERT INTO organizations
                      (id, name, legal_name, country, is_active, created_at, updated_at)
                  VALUES
                      (999, 'Audit Migration', 'Audit Migration', 'SA', 1,
                       CURRENT_TIMESTAMP, CURRENT_TIMESTAMP)
                  """
              )
              connection.execute(
                  """
                  INSERT INTO users
                      (id, organization_id, email, full_name, role, hashed_password,
                       is_active, security_version, security_changed_at, created_at, updated_at)
                  VALUES
                      (999, 999, 'audit-migration@test.invalid', 'Audit Migration',
                       'owner', 'not-used', 1, 1, NULL, CURRENT_TIMESTAMP, CURRENT_TIMESTAMP)
                  """
              )
              connection.execute(
                  """
                  INSERT INTO audit_logs
                      (organization_id, user_id, action, entity_type, entity_id,
                       ip_address, details, created_at, updated_at)
                  VALUES
                      (999, 999, 'legacy_audit_event', 'migration', '999',
                       '127.0.0.1', '{"legacy":true}', CURRENT_TIMESTAMP, CURRENT_TIMESTAMP)
                  """
              )
              connection.commit()
          finally:
              connection.close()
          PY
      - name: Upgrade to immutable audit chain
        run: |
          alembic upgrade b4e2c7d9f130
          python - <<'PY'
          import sqlite3

          connection = sqlite3.connect("ci-migrations.db")
          try:
              revision = connection.execute(
                  "SELECT version_num FROM alembic_version"
              ).fetchone()[0]
              assert revision == "b4e2c7d9f130"

              tables = {
                  row[0]
                  for row in connection.execute(
                      "SELECT name FROM sqlite_master WHERE type='table'"
                  )
              }
              assert "audit_log_chain_heads" in tables

              columns = {
                  row[1]
                  for row in connection.execute("PRAGMA table_info(audit_logs)")
              }
              assert {
                  "scope_key",
                  "sequence_number",
                  "previous_hash",
                  "event_hash",
                  "event_version",
              } <= columns

              event = connection.execute(
                  """
                  SELECT scope_key, sequence_number, previous_hash,
                         event_hash, event_version
                    FROM audit_logs
                   WHERE action = 'legacy_audit_event'
                  """
              ).fetchone()
              assert event is not None
              assert event[0] == "org:999"
              assert event[1] == 1
              assert event[2] == "0" * 64
              assert len(event[3]) == 64
              assert event[4] == 1

              head = connection.execute(
                  """
                  SELECT last_sequence, last_hash
                    FROM audit_log_chain_heads
                   WHERE scope_key = 'org:999'
                  """
              ).fetchone()
              assert head == (1, event[3])

              triggers = {
                  row[0]
                  for row in connection.execute(
                      "SELECT name FROM sqlite_master WHERE type='trigger'"
                  )
              }
              assert {
                  "trg_audit_logs_no_update",
                  "trg_audit_logs_no_delete",
              } <= triggers

              try:
                  connection.execute(
                      "UPDATE audit_logs SET action = 'tampered' "
                      "WHERE action = 'legacy_audit_event'"
                  )
              except sqlite3.DatabaseError as exc:
                  assert "append-only" in str(exc).lower()
              else:
                  raise AssertionError("Audit UPDATE trigger did not fire")

              try:
                  connection.execute(
                      "DELETE FROM audit_logs WHERE action = 'legacy_audit_event'"
                  )
              except sqlite3.DatabaseError as exc:
                  assert "append-only" in str(exc).lower()
              else:
                  raise AssertionError("Audit DELETE trigger did not fire")
          finally:
              connection.close()
          PY
      - name: Downgrade immutable controls to parent
        run: |
          alembic downgrade a8c4e1f2d670
          python - <<'PY'
          import sqlite3

          connection = sqlite3.connect("ci-migrations.db")
          try:
              assert connection.execute(
                  "SELECT version_num FROM alembic_version"
              ).fetchone()[0] == "a8c4e1f2d670"
              tables = {
                  row[0]
                  for row in connection.execute(
                      "SELECT name FROM sqlite_master WHERE type='table'"
                  )
              }
              assert "audit_log_chain_heads" not in tables
              columns = {
                  row[1]
                  for row in connection.execute("PRAGMA table_info(audit_logs)")
              }
              assert "event_hash" not in columns
              assert "sequence_number" not in columns
              connection.execute(
                  "UPDATE audit_logs SET action = 'legacy_audit_event' "
                  "WHERE entity_id = '999'"
              )
              connection.commit()
          finally:
              connection.close()
          PY
      - name: Re-upgrade through encrypted secrets and MFA
        run: |
          alembic upgrade head
          python - <<'PY'
          import sqlite3

          connection = sqlite3.connect("ci-migrations.db")
          try:
              assert connection.execute(
                  "SELECT version_num FROM alembic_version"
              ).fetchone()[0] == "e8b3c0f6a142"
              tables = {
                  row[0]
                  for row in connection.execute(
                      "SELECT name FROM sqlite_master WHERE type='table'"
                  )
              }
              assert {
                  "audit_log_chain_heads",
                  "encrypted_secret_versions",
                  "user_mfa_settings",
                  "mfa_challenges",
              } <= tables
              event = connection.execute(
                  """
                  SELECT sequence_number, previous_hash, event_hash
                    FROM audit_logs
                   WHERE entity_id = '999'
                  """
              ).fetchone()
              assert event is not None
              assert event[0] == 1
              assert event[1] == "0" * 64
              assert len(event[2]) == 64
              head = connection.execute(
                  """
                  SELECT last_sequence, last_hash
                    FROM audit_log_chain_heads
                   WHERE scope_key = 'org:999'
                  """
              ).fetchone()
              assert head == (1, event[2])
          finally:
              connection.close()
          PY