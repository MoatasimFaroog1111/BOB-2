name: Database migrations

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: migrations-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  migration-round-trip:
    name: Alembic — Upgrade, Downgrade, Upgrade
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: BOB-2/backend
    env:
      APP_ENV: test
      DATABASE_URL: sqlite:///./ci-migrations.db
      SECRET_KEY: ci-only-secret-key-that-is-longer-than-thirty-two-characters
      SECRET_STORE_PROVIDER: memory
      LOCAL_LLM_ENABLED: "false"
      EXTERNAL_LLM_ENABLED: "false"
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: BOB-2/backend/requirements.lock
      - name: Install hash-locked dependencies
        run: pip install --quiet --require-hashes -r requirements.lock
      - name: Verify one Alembic head
        run: |
          test "$(alembic heads | grep -c '(head)')" -eq 1
          alembic heads | grep 'a8c4e1f2d670'
      - name: Prepare live-role schema and active pre-rotation session
        run: |
          rm -f ci-migrations.db
          alembic upgrade f3a9d2c7b410
          python - <<'PY'
          import sqlite3

          connection = sqlite3.connect("ci-migrations.db")
          try:
              connection.execute(
                  """
                  INSERT INTO organizations
                      (id, name, legal_name, country, is_active, created_at, updated_at)
                  VALUES
                      (999, 'Rotation Migration', 'Rotation Migration', 'SA', 1,
                       CURRENT_TIMESTAMP, CURRENT_TIMESTAMP)
                  """
              )
              connection.execute(
                  """
                  INSERT INTO users
                      (id, organization_id, email, full_name, role, hashed_password,
                       is_active, security_version, security_changed_at, created_at, updated_at)
                  VALUES
                      (999, 999, 'rotation-migration@test.invalid', 'Rotation Migration',
                       'owner', 'not-used', 1, 1, NULL, CURRENT_TIMESTAMP, CURRENT_TIMESTAMP)
                  """
              )
              connection.execute(
                  """
                  INSERT INTO auth_sessions
                      (id, family_id, user_id, organization_id, user_security_version,
                       access_jti, refresh_jti, refresh_token_hash, expires_at, revoked_at,
                       revocation_reason, last_used_at, ip_address, user_agent,
                       created_at, updated_at)
                  VALUES
                      ('pre-rotation-session', 'pre-rotation-family', 999, 999, 1,
                       'pre-access', 'pre-refresh',
                       'aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa',
                       '2099-01-01 00:00:00', NULL, NULL, NULL, '127.0.0.1',
                       'migration-test', CURRENT_TIMESTAMP, CURRENT_TIMESTAMP)
                  """
              )
              connection.commit()
          finally:
              connection.close()
          PY
      - name: Upgrade to atomic refresh rotation migration
        run: |
          alembic upgrade head
          python - <<'PY'
          import sqlite3

          connection = sqlite3.connect("ci-migrations.db")
          try:
              revision = connection.execute(
                  "SELECT version_num FROM alembic_version"
              ).fetchone()[0]
              assert revision == "a8c4e1f2d670"

              tables = {
                  row[0]
                  for row in connection.execute(
                      "SELECT name FROM sqlite_master WHERE type='table'"
                  )
              }
              assert "auth_session_rotation_states" in tables
              assert "auth_session_security_events" in tables
              assert "tenant_secret_bindings" in tables
              assert "journal_entries" in tables

              state = connection.execute(
                  """
                  SELECT family_id, generation, last_rotated_at
                    FROM auth_session_rotation_states
                   WHERE session_id = 'pre-rotation-session'
                  """
              ).fetchone()
              assert state == ('pre-rotation-family', 0, None)

              session = connection.execute(
                  """
                  SELECT revoked_at, revocation_reason
                    FROM auth_sessions
                   WHERE id = 'pre-rotation-session'
                  """
              ).fetchone()
              assert session is not None
              assert session[0] is not None
              assert session[1] == 'atomic_rotation_migration'

              event = connection.execute(
                  """
                  SELECT event_type, outcome, generation
                    FROM auth_session_security_events
                   WHERE session_id = 'pre-rotation-session'
                  """
              ).fetchone()
              assert event == ('atomic_rotation_migration', 'revoked', 0)
          finally:
              connection.close()
          PY
      - name: Downgrade and verify rotation tables are removed
        run: |
          alembic downgrade f3a9d2c7b410
          python - <<'PY'
          import sqlite3

          connection = sqlite3.connect("ci-migrations.db")
          try:
              revision = connection.execute(
                  "SELECT version_num FROM alembic_version"
              ).fetchone()[0]
              assert revision == "f3a9d2c7b410"
              tables = {
                  row[0]
                  for row in connection.execute(
                      "SELECT name FROM sqlite_master WHERE type='table'"
                  )
              }
              assert "auth_session_rotation_states" not in tables
              assert "auth_session_security_events" not in tables
              assert "auth_sessions" in tables
          finally:
              connection.close()
          PY
      - name: Re-upgrade and verify atomic rotation state
        run: |
          alembic upgrade head
          python - <<'PY'
          import sqlite3

          connection = sqlite3.connect("ci-migrations.db")
          try:
              revision = connection.execute(
                  "SELECT version_num FROM alembic_version"
              ).fetchone()[0]
              assert revision == "a8c4e1f2d670"
              state = connection.execute(
                  """
                  SELECT family_id, generation
                    FROM auth_session_rotation_states
                   WHERE session_id = 'pre-rotation-session'
                  """
              ).fetchone()
              assert state == ('pre-rotation-family', 0)
              event_count = connection.execute(
                  """
                  SELECT COUNT(*)
                    FROM auth_session_security_events
                   WHERE session_id = 'pre-rotation-session'
                     AND event_type = 'atomic_rotation_migration'
                  """
              ).fetchone()[0]
              assert event_count == 1
          finally:
              connection.close()
          PY
