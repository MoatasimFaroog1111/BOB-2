name: Monetary integrity

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: monetary-integrity-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  fixed-point-accounting:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: BOB-2/backend
    env:
      APP_ENV: test
      DATABASE_URL: sqlite:///./ci-monetary-integrity.db
      SECRET_KEY: ci-only-secret-key-that-is-longer-than-thirty-two-characters
      SECRET_STORE_PROVIDER: memory
      LOCAL_LLM_ENABLED: "false"
      EXTERNAL_LLM_ENABLED: "false"
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: BOB-2/backend/requirements.lock
      - name: Install hash-locked dependencies
        run: pip install --quiet --require-hashes -r requirements.lock
      - name: Compile monetary paths
        run: >-
          python -m compileall -q
          app/core/money.py
          app/models/core.py
          app/models/bank_reconciliation.py
          app/api/v1/journal.py
          app/api/v1/bank_posting_v2.py
          app/api/v1/journal_entry_actions.py
          app/api/v1/erp_monetary_legacy.py
          app/api/v1/router.py
          app/erp/bank_reconciliation.py
          app/services/telegram_accounting_service.py
          tests/test_monetary_integrity.py
      - name: Enforce fixed-point source boundaries
        run: |
          python - <<'PY'
          from pathlib import Path

          def require(name: str, condition: bool) -> None:
              if not condition:
                  raise AssertionError(f"Monetary integrity control failed: {name}")
              print(f"OK: {name}")

          sources = {
              "money": Path("app/core/money.py").read_text(encoding="utf-8"),
              "core model": Path("app/models/core.py").read_text(encoding="utf-8"),
              "bank model": Path("app/models/bank_reconciliation.py").read_text(encoding="utf-8"),
              "journal": Path("app/api/v1/journal.py").read_text(encoding="utf-8"),
              "bank posting": Path("app/api/v1/bank_posting_v2.py").read_text(encoding="utf-8"),
              "journal actions": Path("app/api/v1/journal_entry_actions.py").read_text(encoding="utf-8"),
              "legacy replacements": Path("app/api/v1/erp_monetary_legacy.py").read_text(encoding="utf-8"),
              "API router": Path("app/api/v1/router.py").read_text(encoding="utf-8"),
              "bank reconciliation": Path("app/erp/bank_reconciliation.py").read_text(encoding="utf-8"),
              "Telegram accounting": Path("app/services/telegram_accounting_service.py").read_text(encoding="utf-8"),
          }

          money = sources["money"]
          required_money = (
              'MONEY_QUANTUM = Decimal("0.01")',
              "ROUND_HALF_UP",
              "def parse_money(",
              "def money_to_str(",
              "def money_to_erp_float(",
              "def validate_balanced_lines(",
              "class FixedPointJSON",
          )
          for control in required_money:
              require(f"money primitive {control}", control in money)

          core = sources["core model"]
          bank_model = sources["bank model"]
          require("journal totals use NUMERIC(20,2)", core.count("Numeric(20, 2)") >= 2)
          require("journal database balance constraint", "ck_journal_entries_balanced_totals" in core)
          require("journal database positive-total constraint", "ck_journal_entries_positive_total" in core)
          require("reconciliation totals use NUMERIC(20,2)", bank_model.count("Numeric(20, 2)") >= 3)
          require("reconciliation JSON fixed-point adapter", "FixedPointJSON" in bank_model)
          require("no persisted Float columns in core model", "mapped_column(Float" not in core)
          require("no persisted Float columns in bank model", "mapped_column(Float" not in bank_model)

          for source_name in (
              "journal",
              "bank posting",
              "journal actions",
              "legacy replacements",
              "bank reconciliation",
              "Telegram accounting",
          ):
              source = sources[source_name]
              require(f"no float summation in {source_name}", "round(sum(float" not in source)
              require(f"no float finiteness gate in {source_name}", "math.isfinite" not in source)

          journal = sources["journal"]
          require("journal Decimal request amounts", "NonNegativeMoney" in journal)
          require("journal exact balance validation", "validate_balanced_lines" in journal)
          require("journal fixed-string line persistence", "canonical_money_lines" in journal)
          require("journal fixed-string audit totals", "money_to_str(total_debit)" in journal)

          posting = sources["bank posting"]
          require("bank posting Decimal requests", "NonNegativeMoney" in posting and "amount: Money" in posting)
          require("bank posting final ERP boundary helper", "money_to_erp_float" in posting)
          require("bank posting idempotency fixed amount", "money_to_str(payload.amount)" in posting)
          require("bank posting no direct amount float", "float(payload.amount" not in posting)
          require("bank posting no direct line float", "float(line.debit" not in posting and "float(line.credit" not in posting)

          actions = sources["journal actions"]
          require("journal actions Decimal request amounts", "NonNegativeMoney" in actions)
          require("journal actions exact balance validation", "validate_balanced_lines" in actions)
          require("journal actions final ERP boundary helper", "money_to_erp_float" in actions)
          require("journal actions no Optional float money", "Optional[float]" not in actions)
          require("journal actions no direct balance float", "float(line.get(\"debit\"" not in actions)

          reconciliation = sources["bank reconciliation"]
          require("reconciliation Transaction amount is Money", "amount: Money" in reconciliation)
          require("reconciliation totals are Money", "statement_total: Money" in reconciliation and "ledger_total: Money" in reconciliation)
          require("reconciliation uses Decimal parser", "Optional[Decimal]" in reconciliation and "parse_money(" in reconciliation)
          require("reconciliation uses exact money sum", "money_sum(" in reconciliation)
          require("reconciliation exact amount match", "statement_txn.amount == ledger_txn.amount" in reconciliation)
          require("reconciliation removed float tolerance", "abs(s_txn.amount - l_txn.amount) < 0.01" not in reconciliation)

          telegram = sources["Telegram accounting"]
          require("Telegram canonical monetary payload", "canonical_money_lines" in telegram)
          require("Telegram exact balance validation", "validate_balanced_lines" in telegram)
          require("Telegram final ERP boundary helper", "money_to_erp_float" in telegram)
          require("Telegram amount stored as fixed string", 'normalized["amount"] = money_to_str(amount)' in telegram)
          require("Telegram payload declares scale", '"money_scale": 2' in telegram)
          require("Telegram no direct line float", "float(line.get(\"debit\"" not in telegram)
          require("Telegram no float balance tolerance", "abs(debit_total - credit_total)" not in telegram)

          replacements = sources["legacy replacements"]
          api_router = sources["API router"]
          require("legacy float routes are removed before inclusion", "replace_unsafe_legacy_routes(erp_router)" in api_router)
          require("Decimal-safe replacement router is included", "erp_monetary_legacy_router" in api_router)
          require("replacement proposal requires current create permission", 'require_permission("create_entries")' in replacements)
          require("replacement posting requires current Odoo permission", 'require_permission("post_odoo_entries")' in replacements)
          require("replacement routes are tenant-scoped", "ERPConnection.organization_id == organization_id" in replacements)
          require("replacement registration validates exact balance", "validate_balanced_lines(raw_lines)" in replacements)
          require("replacement registration uses boundary conversion", "money_to_erp_float" in replacements)
          require("replacement registration rejects server paths", "Server-side file paths are no longer accepted" in replacements)
          PY
      - name: Run fixed-point regression tests
        run: pytest -q tests/test_monetary_integrity.py
      - name: Run posting, reconciliation, and Telegram approval regressions
        run: >-
          pytest -q
          tests/test_bank_reconciliation.py
          tests/test_bank_reconciliation_full.py
          tests/test_bank_reconciliation_hardening.py
          tests/test_telegram_accounting_approvals.py
