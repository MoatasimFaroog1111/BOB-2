name: PostgreSQL release gate

on:
  pull_request:
    branches: [main]
    paths:
      - "BOB-2/backend/**"
      - ".github/workflows/postgresql-release-gate.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  integration-and-restore:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: guardian
          POSTGRES_PASSWORD: guardian-ci-strong-password
          POSTGRES_DB: guardianai_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U guardian -d guardianai_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    defaults:
      run:
        working-directory: BOB-2/backend
    env:
      APP_ENV: test
      DATABASE_URL: postgresql+psycopg2://guardian:guardian-ci-strong-password@127.0.0.1:5432/guardianai_test
      SECRET_KEY: ci-only-secret-key-that-is-longer-than-thirty-two-characters
      SECRET_STORE_PROVIDER: memory
      SECRET_STORE_ENCRYPTION_KEY: MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=
      LOCAL_LLM_ENABLED: "false"
      EXTERNAL_LLM_ENABLED: "false"
      PGPASSWORD: guardian-ci-strong-password
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: BOB-2/backend/requirements.txt
      - name: Install integration dependencies
        run: pip install --quiet -r requirements.txt
      - name: Require one Alembic head
        run: |
          heads="$(alembic heads | grep -c '(head)' || true)"
          test "$heads" -eq 1
      - name: Apply migrations to PostgreSQL
        run: alembic upgrade head
      - name: Exercise encrypted secrets and tenant isolation on PostgreSQL
        env:
          SECRET_STORE_PROVIDER: encrypted_db
        run: python scripts/postgresql_release_check.py
      - name: Run security regression tests
        run: >-
          python -m pytest -q --tb=short
          tests/test_production_security_config.py
          tests/test_runtime_storage_security.py
          tests/test_encrypted_secret_provider.py
          tests/test_mfa.py
          tests/test_tenant_isolation.py
          tests/test_tenant_isolation_completion.py
          tests/test_immutable_audit_chain.py
      - name: Seed backup verification marker
        run: |
          python - <<'PY'
          from app.db.database import SessionLocal
          from app.models.core import Organization
          db = SessionLocal()
          try:
              row = db.get(Organization, 900001)
              if row is None:
                  db.add(Organization(id=900001, name="Backup Verification", legal_name="Backup Verification", country="SA", is_active=True))
              db.commit()
          finally:
              db.close()
          PY
      - name: Create restore verification backup
        run: |
          pg_dump \
            --host=127.0.0.1 --username=guardian --dbname=guardianai_test \
            --format=custom --no-owner --no-acl \
            --file=/tmp/guardianai.backup
          test -s /tmp/guardianai.backup
          sha256sum /tmp/guardianai.backup > /tmp/guardianai.backup.sha256
      - name: Restore into clean PostgreSQL database
        run: |
          createdb --host=127.0.0.1 --username=guardian guardianai_restored
          pg_restore \
            --host=127.0.0.1 --username=guardian --dbname=guardianai_restored \
            --no-owner --no-acl --exit-on-error \
            /tmp/guardianai.backup
          restored_count="$(psql --host=127.0.0.1 --username=guardian --dbname=guardianai_restored --tuples-only --no-align --command='SELECT COUNT(*) FROM organizations WHERE id = 900001;')"
          test "$restored_count" = "1"
          migration_count="$(psql --host=127.0.0.1 --username=guardian --dbname=guardianai_restored --tuples-only --no-align --command='SELECT COUNT(*) FROM alembic_version;')"
          test "$migration_count" = "1"
      - name: Verify restored audit controls
        env:
          DATABASE_URL: postgresql+psycopg2://guardian:guardian-ci-strong-password@127.0.0.1:5432/guardianai_restored
        run: python scripts/check_immutable_audit_chain.py
      - name: Upload backup checksum only
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: postgresql-backup-verification-${{ github.run_id }}
          path: /tmp/guardianai.backup.sha256
          if-no-files-found: error
          retention-days: 7
