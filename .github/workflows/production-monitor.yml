name: Production monitor

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-monitor
  cancel-in-progress: false

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Validate monitoring configuration
        env:
          BACKEND_URL: ${{ secrets.PRODUCTION_BACKEND_URL }}
        run: |
          if [ -z "$BACKEND_URL" ]; then
            echo "PRODUCTION_BACKEND_URL repository secret is required." >&2
            exit 1
          fi
          case "$BACKEND_URL" in
            https://*) ;;
            *) echo "PRODUCTION_BACKEND_URL must use HTTPS." >&2; exit 1 ;;
          esac
      - name: Probe liveness and readiness
        env:
          BACKEND_URL: ${{ secrets.PRODUCTION_BACKEND_URL }}
        run: |
          base="${BACKEND_URL%/}"
          curl --fail --silent --show-error \
            --connect-timeout 10 --max-time 20 \
            --retry 2 --retry-delay 5 --retry-all-errors \
            "$base/health" | tee /tmp/health.json
          curl --fail --silent --show-error \
            --connect-timeout 10 --max-time 20 \
            --retry 2 --retry-delay 5 --retry-all-errors \
            "$base/ready" | tee /tmp/ready.json
          python - <<'PY'
          import json
          from pathlib import Path
          health = json.loads(Path('/tmp/health.json').read_text())
          ready = json.loads(Path('/tmp/ready.json').read_text())
          assert health.get('status') == 'healthy', health
          assert ready.get('status') == 'ready', ready
          assert all(ready.get('components', {}).values()), ready
          PY
      - name: Preserve probe evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: production-monitor-${{ github.run_id }}
          path: |
            /tmp/health.json
            /tmp/ready.json
          if-no-files-found: warn
          retention-days: 14
