name: Railway backend image

on:
  push:
    branches:
      - main
    paths:
      - "BOB-2/Dockerfile"
      - "BOB-2/railway.toml"
      - "BOB-2/backend/requirements.txt"
      - ".github/workflows/railway-backend-image.yml"
  pull_request:
    branches:
      - main
    paths:
      - "BOB-2/Dockerfile"
      - "BOB-2/railway.toml"
      - "BOB-2/backend/requirements.txt"
      - ".github/workflows/railway-backend-image.yml"

permissions:
  contents: read

concurrency:
  group: railway-backend-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build-and-smoke-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Build the Railway backend image
        run: docker build --quiet --file BOB-2/Dockerfile --tag bob2-railway:test BOB-2

      - name: Verify migrations inside the image
        run: |
          set +e
          docker run --name bob2-migration-test \
            --env APP_ENV=test \
            --env DATABASE_URL=sqlite:////app/storage/railway-migration.db \
            --env SECRET_KEY=ci-only-secret-key-that-is-longer-than-thirty-two-characters \
            --env SECRET_STORE_PROVIDER=memory \
            --env LOCAL_LLM_ENABLED=false \
            --env EXTERNAL_LLM_ENABLED=false \
            bob2-railway:test \
            alembic upgrade head > railway-migration.log 2>&1
          exit_code=$?
          cat railway-migration.log
          exit "$exit_code"

      - name: Start the backend container
        run: |
          docker run --detach --name bob2-railway-test \
            --publish 8000:8000 \
            --env APP_ENV=test \
            --env PORT=8000 \
            --env DATABASE_URL=sqlite:////app/storage/railway-smoke.db \
            --env SECRET_KEY=ci-only-secret-key-that-is-longer-than-thirty-two-characters \
            --env SECRET_STORE_PROVIDER=memory \
            --env LOCAL_LLM_ENABLED=false \
            --env EXTERNAL_LLM_ENABLED=false \
            bob2-railway:test

      - name: Verify the Railway health endpoint
        run: |
          for attempt in $(seq 1 60); do
            if curl --fail --silent http://127.0.0.1:8000/health >/dev/null 2>&1; then
              curl --fail --silent --show-error http://127.0.0.1:8000/health
              exit 0
            fi
            if ! docker inspect --format '{{.State.Running}}' bob2-railway-test | grep -q true; then
              exit 1
            fi
            sleep 2
          done
          exit 1

      - name: Capture container diagnostics
        if: always()
        run: |
          docker inspect --format 'status={{.State.Status}} exit_code={{.State.ExitCode}} oom_killed={{.State.OOMKilled}} error={{.State.Error}} finished_at={{.State.FinishedAt}}' \
            bob2-railway-test > railway-container-state.txt 2>&1 || true
          docker logs bob2-railway-test > railway-container.log 2>&1 || true

      - name: Upload failure diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: railway-backend-failure-${{ github.run_id }}
          path: |
            railway-migration.log
            railway-container.log
            railway-container-state.txt
          if-no-files-found: warn
          retention-days: 3

      - name: Show container diagnostics on failure
        if: failure()
        run: |
          cat railway-migration.log || true
          cat railway-container-state.txt || true
          cat railway-container.log || true

      - name: Stop test containers
        if: always()
        run: |
          docker rm --force bob2-railway-test || true
          docker rm --force bob2-migration-test || true
