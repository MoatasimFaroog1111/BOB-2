name: Regenerate frontend lockfile

on:
  push:
    branches:
      - agent/security-hardening-bob2
    paths:
      - BOB-2/frontend/package.json
      - .github/workflows/regenerate-frontend-lock.yml

permissions:
  contents: write

jobs:
  regenerate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/security-hardening-bob2
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: BOB-2/frontend/package-lock.json
      - name: Regenerate lockfile from exact direct dependencies
        working-directory: BOB-2/frontend
        run: npm install --package-lock-only --ignore-scripts
      - name: Verify no high severity advisories
        working-directory: BOB-2/frontend
        run: npm audit --audit-level=high
      - name: Commit regenerated lockfile
        run: |
          if git diff --quiet -- BOB-2/frontend/package-lock.json; then
            echo "Lockfile is already current."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add BOB-2/frontend/package-lock.json
          git commit -m "regenerate audited frontend lockfile"
          git push origin HEAD:agent/security-hardening-bob2
