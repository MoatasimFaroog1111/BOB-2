name: Remove AGPL PDF dependency

on:
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize]
    paths:
      - "BOB-2/backend/scripts/remove_pymupdf_dependency.py"
      - "BOB-2/backend/requirements.txt"
      - "BOB-2/backend/requirements.runtime.txt"
      - "BOB-2/backend/app/erp/document_ai.py"
      - "BOB-2/backend/app/erp/pdf_statement_parser.py"
      - "BOB-2/backend/app/security/file_validation.py"
      - ".github/workflows/remove-agpl-pdf-dependency.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: remove-agpl-pdf-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  migrate-and-verify:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref_name }}
          fetch-depth: 0
      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: BOB-2/backend/requirements.txt
      - name: Apply deterministic PDF migration
        working-directory: BOB-2/backend
        run: python scripts/remove_pymupdf_dependency.py
      - name: Install migrated dependencies
        working-directory: BOB-2/backend
        run: pip install --quiet -r requirements.txt
      - name: Verify PDF and document regressions
        working-directory: BOB-2/backend
        env:
          APP_ENV: test
          DATABASE_URL: sqlite:///./pdf-license-migration.db
          SECRET_KEY: ci-only-secret-key-that-is-longer-than-thirty-two-characters
          SECRET_STORE_PROVIDER: memory
        run: >-
          python -m pytest -q --tb=short
          tests/test_security_hardening.py
          tests/test_bank_reconciliation.py
          tests/test_bank_reconciliation_full.py
          tests/test_bank_reconciliation_hardening.py
          tests/test_erp_monetary_route_replacement.py
      - name: Verify PyMuPDF is absent
        working-directory: BOB-2/backend
        run: |
          ! grep -RInE '(^|[[:space:]])import fitz|PyMuPDF' app requirements.txt requirements.runtime.txt
          python - <<'PY'
          import importlib.metadata as metadata
          names = {dist.metadata['Name'].lower() for dist in metadata.distributions() if dist.metadata.get('Name')}
          assert 'pymupdf' not in names
          for required in ('pypdf', 'pdfplumber', 'pypdfium2'):
              assert required in names, required
          PY
      - name: Commit successful migration
        run: |
          if git diff --quiet; then
            echo "PDF dependency migration already applied."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            BOB-2/backend/requirements.txt \
            BOB-2/backend/requirements.runtime.txt \
            BOB-2/backend/app/erp/document_ai.py \
            BOB-2/backend/app/erp/pdf_statement_parser.py \
            BOB-2/backend/app/security/file_validation.py
          git commit -m "refactor(pdf): replace PyMuPDF with permissive libraries"
          git push origin "HEAD:${{ github.event.pull_request.head.ref || github.ref_name }}"
