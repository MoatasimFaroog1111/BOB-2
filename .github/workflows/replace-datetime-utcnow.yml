name: Replace deprecated UTC calls

on:
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize]
    paths:
      - "BOB-2/backend/scripts/replace_datetime_utcnow.py"
      - "BOB-2/backend/app/**"
      - "BOB-2/backend/tests/**"
      - ".github/workflows/replace-datetime-utcnow.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: replace-utcnow-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  migrate-and-test:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: BOB-2/backend
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref_name }}
          fetch-depth: 0
      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: BOB-2/backend/requirements.lock
      - name: Apply UTC migration
        run: python scripts/replace_datetime_utcnow.py
      - name: Verify source contains no deprecated UTC calls
        run: '! grep -RIn "datetime\.utcnow" app tests'
      - name: Install hash-locked dependencies
        run: pip install --quiet --require-hashes -r requirements.lock
      - name: Run full backend regression suite
        env:
          APP_ENV: test
          DATABASE_URL: sqlite:///./utc-migration.db
          SECRET_KEY: ci-only-secret-key-that-is-longer-than-thirty-two-characters
          SECRET_STORE_PROVIDER: memory
          LOCAL_LLM_ENABLED: "false"
          EXTERNAL_LLM_ENABLED: "false"
        run: python -m pytest tests/ -q --tb=short
      - name: Commit successful migration
        run: |
          if git diff --quiet -- app tests; then
            echo "UTC migration already applied."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app tests
          git commit -m "refactor(time): replace deprecated datetime utcnow"
          git push origin "HEAD:${{ github.event.pull_request.head.ref || github.ref_name }}"
