name: Security checks

on:
  push:
    branches:
      - main
      - "agent/**"
  pull_request:

permissions:
  contents: read

jobs:
  backend-security:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: BOB-2/backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: BOB-2/backend/requirements.txt
      - name: Install dependencies
        run: |
          python -m pip install --quiet --upgrade pip
          pip install --quiet -r requirements.txt
          pip install --quiet pip-audit==2.9.0
      - name: Audit Python dependencies
        id: python_audit
        continue-on-error: true
        run: pip-audit -r requirements.txt --strict > pip-audit.log 2>&1
      - name: Upload Python audit diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-pip-audit-log
          path: BOB-2/backend/pip-audit.log
          retention-days: 1
      - name: Enforce clean Python dependency audit
        if: steps.python_audit.outcome == 'failure'
        run: |
          cat pip-audit.log
          exit 1
      - name: Compile Python sources
        run: python -m compileall -q app tests
      - name: Run backend tests
        env:
          APP_ENV: test
          DATABASE_URL: sqlite:///./ci-test.db
          SECRET_KEY: ci-only-secret-key-that-is-longer-than-thirty-two-characters
        run: pytest -q

  frontend-security:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: BOB-2/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: BOB-2/frontend/package-lock.json
      - name: Install locked dependencies
        run: npm ci --ignore-scripts
      - name: Audit npm dependencies
        run: npm audit --audit-level=high
      - name: Build frontend
        id: frontend_build
        continue-on-error: true
        env:
          NEXT_PUBLIC_API_BASE_URL: https://api.example.invalid
        run: npm run build > build.log 2>&1
      - name: Upload frontend build diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build-log
          path: BOB-2/frontend/build.log
          retention-days: 1
      - name: Enforce successful frontend build
        if: steps.frontend_build.outcome == 'failure'
        run: |
          tail -n 200 build.log
          exit 1

# GitHub's dependency-review action requires repository dependency-graph support.
# Portable, blocking audits are performed above with pip-audit and npm audit so this
# workflow works consistently without weakening the severity threshold.
