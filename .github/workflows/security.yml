name: Security checks

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: security-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  backend-security:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: BOB-2/backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: BOB-2/backend/requirements.lock
      - name: Install hash-locked dependencies
        run: |
          python -m pip install --quiet --upgrade pip
          pip install --quiet --require-hashes -r requirements.lock
          pip install --quiet pip-audit==2.9.0
      - name: Audit complete Python dependency graph
        run: pip-audit -r requirements.lock --strict
      - name: Compile Python sources
        run: python -m compileall -q app tests
      - name: Run backend tests
        env:
          APP_ENV: test
          DATABASE_URL: sqlite:///./ci-test.db
          SECRET_KEY: ci-only-secret-key-that-is-longer-than-thirty-two-characters
        run: pytest -q

  frontend-security:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: BOB-2/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: BOB-2/frontend/package-lock.json
      - name: Install locked dependencies
        run: npm ci --ignore-scripts
      - name: Audit npm dependencies
        run: npm audit --audit-level=high
      - name: Build frontend with production CSP
        env:
          NEXT_PUBLIC_API_BASE_URL: https://api.example.invalid
        run: npm run build

  compose-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate hardened Compose configuration
        working-directory: BOB-2
        env:
          POSTGRES_PASSWORD: ci-postgres-password
          REDIS_PASSWORD: ci-redis-password
          DATABASE_URL: postgresql://guardian:ci-postgres-password@db:5432/guardianai
          REDIS_URL: redis://:ci-redis-password@redis:6379/0
          SECRET_KEY: ci-only-secret-key-that-is-longer-than-thirty-two-characters
          FRONTEND_ORIGIN: https://app.example.invalid
          TRUSTED_HOSTS: app.example.invalid,api.example.invalid
          NEXT_PUBLIC_API_BASE_URL: https://api.example.invalid
        run: |
          docker compose config --quiet
          rendered="$(docker compose config)"
          if grep -Eq '(^|[[:space:]])5432:5432|0\.0\.0\.0:5432' <<<"$rendered"; then
            echo "PostgreSQL must not be published to the host"
            exit 1
          fi
          grep -q '127.0.0.1:8000' <<<"$rendered"
          grep -q '127.0.0.1:3000' <<<"$rendered"
