name: Security checks

on:
  push:
    branches:
      - main
      - "agent/**"
  pull_request:

permissions:
  contents: read

jobs:
  backend-security:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: BOB-2/backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: BOB-2/backend/requirements.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pip-audit==2.9.0
      - name: Audit Python dependencies
        run: pip-audit -r requirements.txt --strict
      - name: Compile Python sources
        run: python -m compileall -q app tests
      - name: Run backend tests
        env:
          APP_ENV: test
          DATABASE_URL: sqlite:///./ci-test.db
          SECRET_KEY: ci-only-secret-key-that-is-longer-than-thirty-two-characters
        run: pytest -q

  frontend-security:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: BOB-2/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: BOB-2/frontend/package-lock.json
      - name: Install locked dependencies
        run: npm ci --ignore-scripts
      - name: Audit npm dependencies
        run: npm audit --audit-level=high
      - name: Build frontend
        env:
          NEXT_PUBLIC_API_BASE_URL: https://api.example.invalid
        run: npm run build

# GitHub's dependency-review action requires repository dependency-graph support.
# Portable, blocking audits are performed above with pip-audit and npm audit so this
# workflow works consistently without weakening the severity threshold.
