name: Security checks

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: security-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  backend-security:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: BOB-2/backend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: BOB-2/backend/requirements.lock
      - name: Install hash-locked dependencies
        run: |
          python -m pip install --quiet --upgrade pip
          pip install --quiet --require-hashes -r requirements.lock
          pip install --quiet pip-audit==2.9.0
      - name: Audit complete Python dependency graph
        run: pip-audit -r requirements.lock --strict
      - name: Compile Python sources
        run: python -m compileall -q app tests
      - name: Enforce Telegram route and ingestion isolation
        run: |
          python - <<'PY'
          from pathlib import Path

          bot_source = Path("app/services/telegram_bot.py").read_text(encoding="utf-8")
          forbidden_route_calls = (
              "app.api.v1.erp",
              "propose_transaction",
              "register_document",
              "ProposeTransactionRequest",
              "RegisterDocumentRequest",
          )
          violations = [item for item in forbidden_route_calls if item in bot_source]
          assert not violations, f"Telegram bot depends on FastAPI ERP routes: {violations}"
          assert "urlretrieve" not in bot_source, "Unbounded Telegram download was reintroduced"
          assert "target=process_document" not in bot_source, "Thread-per-upload was reintroduced"
          assert "Direct Telegram download is disabled" in bot_source
          assert "secure_polling_loop" in bot_source

          ingestion_source = Path("app/services/telegram_ingestion.py").read_text(encoding="utf-8")
          required_ingestion_controls = (
              "queue.Queue",
              "TELEGRAM_API_HOST",
              "Content-Length",
              "telegram_download_stream_limit_exceeded",
              "scan_for_malware",
              "validate_file_content",
              "max_pending_per_actor",
              "max_pending_per_organization",
              "rate_window_seconds",
              "job_ttl_seconds",
              "os.fsync",
              "part_path.replace(destination)",
          )
          missing = [item for item in required_ingestion_controls if item not in ingestion_source]
          assert not missing, f"Telegram ingestion controls missing: {missing}"

          approval_source = Path("app/services/telegram_accounting_service.py").read_text(encoding="utf-8")
          assert "approval_token_hash" in approval_source
          assert "status == \"pending\"" in approval_source
          assert "post_odoo_entries" in approval_source
          PY
      - name: Run Telegram ingestion regression tests
        env:
          APP_ENV: test
          DATABASE_URL: sqlite:///./ci-ingestion-test.db
          SECRET_KEY: ci-only-secret-key-that-is-longer-than-thirty-two-characters
        run: pytest -q tests/test_telegram_ingestion_security.py
      - name: Run backend tests
        env:
          APP_ENV: test
          DATABASE_URL: sqlite:///./ci-test.db
          SECRET_KEY: ci-only-secret-key-that-is-longer-than-thirty-two-characters
        run: pytest -q

  frontend-security:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: BOB-2/frontend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: BOB-2/frontend/package-lock.json
      - name: Install locked dependencies
        run: npm ci --ignore-scripts
      - name: Audit npm dependencies
        run: npm audit --audit-level=high
      - name: Build frontend with production CSP
        env:
          NEXT_PUBLIC_API_BASE_URL: https://api.example.invalid
        run: npm run build

  compose-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Validate hardened Compose configuration
        working-directory: BOB-2
        env:
          POSTGRES_PASSWORD: ci-postgres-password
          REDIS_PASSWORD: ci-redis-password
          DATABASE_URL: postgresql://guardian:ci-postgres-password@db:5432/guardianai
          REDIS_URL: redis://:ci-redis-password@redis:6379/0
          SECRET_KEY: ci-only-secret-key-that-is-longer-than-thirty-two-characters
          FRONTEND_ORIGIN: https://app.example.invalid
          TRUSTED_HOSTS: app.example.invalid,api.example.invalid
          TRUSTED_PROXY_IPS: 127.0.0.1/32
          NEXT_PUBLIC_API_BASE_URL: https://api.example.invalid
        run: |
          docker compose config --quiet
          docker compose config --format json > compose.json
          python - <<'PY'
          import json
          from pathlib import Path

          config = json.loads(Path("compose.json").read_text())
          services = config["services"]

          assert not services["db"].get("ports"), "PostgreSQL must not publish a host port"
          assert not services["redis"].get("ports"), "Redis must not publish a host port"
          assert not services["clamav"].get("ports"), "ClamAV must not publish a host port"
          assert config["networks"]["backend_private"].get("internal") is True

          backend_environment = services["backend"].get("environment", {})
          assert str(backend_environment.get("TELEGRAM_BOT_ENABLED", "")).lower() == "false", (
              "Production Compose must keep Telegram disabled"
          )
          assert str(backend_environment.get("TELEGRAM_BOT_PRODUCTION_READY", "")).lower() == "false", (
              "Production Compose must keep Telegram readiness disabled"
          )
          assert str(backend_environment.get("TELEGRAM_ALLOW_GROUP_CHATS", "")).lower() == "false", (
              "Production Compose must deny Telegram group chats by default"
          )
          approval_ttl = int(backend_environment.get("TELEGRAM_APPROVAL_TTL_SECONDS", 0))
          assert 60 <= approval_ttl <= 3600, "Telegram approval TTL must be bounded"

          workers = int(backend_environment.get("TELEGRAM_INGESTION_WORKERS", 0))
          queue_size = int(backend_environment.get("TELEGRAM_INGESTION_QUEUE_SIZE", 0))
          actor_limit = int(backend_environment.get("TELEGRAM_MAX_PENDING_PER_ACTOR", 0))
          organization_limit = int(backend_environment.get("TELEGRAM_MAX_PENDING_PER_ORGANIZATION", 0))
          rate_limit = int(backend_environment.get("TELEGRAM_UPLOAD_RATE_LIMIT", 0))
          job_ttl = int(backend_environment.get("TELEGRAM_INGESTION_JOB_TTL_SECONDS", 0))
          chunk_size = int(backend_environment.get("TELEGRAM_DOWNLOAD_CHUNK_SIZE_BYTES", 0))
          api_response_limit = int(backend_environment.get("TELEGRAM_API_RESPONSE_MAX_BYTES", 0))
          assert 1 <= workers <= 8
          assert 1 <= queue_size <= 200
          assert 1 <= actor_limit <= organization_limit <= queue_size
          assert 1 <= rate_limit <= 60
          assert 30 <= job_ttl <= 1800
          assert 16384 <= chunk_size <= 1048576
          assert 65536 <= api_response_limit <= 4194304
          assert int(backend_environment.get("MAX_UPLOAD_SIZE_MB", 0)) == 10

          def assert_loopback(service_name: str, published: str) -> None:
              ports = services[service_name].get("ports", [])
              assert len(ports) == 1, f"{service_name} must publish exactly one local port"
              port = ports[0]
              assert port.get("host_ip") == "127.0.0.1", f"{service_name} must bind to loopback"
              assert str(port.get("published")) == published

          assert_loopback("backend", "8000")
          assert_loopback("frontend", "3000")
          PY
