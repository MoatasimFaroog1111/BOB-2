name: Security checks

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: security-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  backend-security:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: BOB-2/backend
    env:
      SECRET_STORE_PROVIDER: memory
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: BOB-2/backend/requirements.lock
      - name: Install hash-locked dependencies
        run: |
          python -m pip install --quiet --upgrade pip
          pip install --quiet --require-hashes -r requirements.lock
          pip install --quiet pip-audit==2.9.0
      - name: Audit complete Python dependency graph
        run: pip-audit -r requirements.lock --strict
      - name: Compile Python sources
        run: python -m compileall -q app tests
      - name: Enforce Telegram, ERP, LLM, and secret-store isolation
        run: |
          python - <<'PY'
          from pathlib import Path

          bot_source = Path("app/services/telegram_bot.py").read_text(encoding="utf-8")
          forbidden_route_calls = (
              "app.api.v1.erp",
              "propose_transaction",
              "register_document",
              "ProposeTransactionRequest",
              "RegisterDocumentRequest",
          )
          violations = [item for item in forbidden_route_calls if item in bot_source]
          assert not violations, f"Telegram bot depends on FastAPI ERP routes: {violations}"
          assert "urlretrieve" not in bot_source, "Unbounded Telegram download was reintroduced"
          assert "target=process_document" not in bot_source, "Thread-per-upload was reintroduced"
          assert "Direct Telegram download is disabled" in bot_source
          assert "secure_polling_loop" in bot_source
          for forbidden in ("telegram_config.json", "encrypted_token", "Fernet", "encrypt_value"):
              assert forbidden not in bot_source, f"Local Telegram secret path returned: {forbidden}"

          communication_source = Path("app/api/v1/communication_tools.py").read_text(encoding="utf-8")
          for forbidden in ("communication_tools.key", "communication_tools.json", "Fernet", "masked_token"):
              assert forbidden not in communication_source, f"Local communication secret storage returned: {forbidden}"
          assert "put_tenant_secret" in communication_source
          assert "revoke_tenant_secret" in communication_source
          assert 'require_permission("manage_settings")' in communication_source

          encryption_source = Path("app/security/encryption.py").read_text(encoding="utf-8")
          for forbidden in ("PBKDF2HMAC", "Fernet", "SECRET_KEY.encode", "SALT_HASH"):
              assert forbidden not in encryption_source, f"Local encryption-key derivation returned: {forbidden}"
          assert "secretref://" in encryption_source
          assert "put_tenant_secret" in encryption_source

          secret_store_source = Path("app/services/secret_store.py").read_text(encoding="utf-8")
          required_secret_controls = (
              "AzureKeyVaultSecretProvider",
              "MemorySecretProvider",
              "memory_secret_store_forbidden_in_production",
              "AZURE_KEY_VAULT_URL",
              ".vault.azure.net",
              "_managed_identity_token",
              "socket.create_connection",
              "server_hostname=self._vault.hostname",
              "azure_key_vault_proxy_tunnel_forbidden",
              "TenantSecretBinding",
              "TenantSecretVersion",
              "fingerprint_sha256",
              "tenant_secret_rotated",
              "tenant_secret_revoked",
              "provider.disable_secret",
          )
          missing_secret_controls = [item for item in required_secret_controls if item not in secret_store_source]
          assert not missing_secret_controls, f"Central secret-store controls missing: {missing_secret_controls}"
          assert "Fernet" not in secret_store_source

          ingestion_source = Path("app/services/telegram_ingestion.py").read_text(encoding="utf-8")
          required_ingestion_controls = (
              "queue.Queue",
              "TELEGRAM_API_HOST",
              "Content-Length",
              "telegram_download_stream_limit_exceeded",
              "scan_for_malware",
              "validate_file_content",
              "max_pending_per_actor",
              "max_pending_per_organization",
              "rate_window_seconds",
              "job_ttl_seconds",
              "os.fsync",
              "part_path.replace(destination)",
          )
          missing = [item for item in required_ingestion_controls if item not in ingestion_source]
          assert not missing, f"Telegram ingestion controls missing: {missing}"

          approval_source = Path("app/services/telegram_accounting_service.py").read_text(encoding="utf-8")
          assert "approval_token_hash" in approval_source
          assert 'status == "pending"' in approval_source
          assert "post_odoo_entries" in approval_source

          provider_source = Path("app/erp/providers/odoo.py").read_text(encoding="utf-8")
          transport_source = Path("app/erp/odoo_transport.py").read_text(encoding="utf-8")
          policy_source = Path("app/security/outbound_network.py").read_text(encoding="utf-8")
          assert "xmlrpc.client.ServerProxy" not in provider_source, "Default unpinned Odoo transport returned"
          assert "create_odoo_server_proxies" in provider_source
          required_transport_controls = (
              "socket.create_connection",
              "server_hostname=self._target.hostname",
              "validate_erp_base_url(self._base_url)",
              "ERP_OUTBOUND_CONNECT_TIMEOUT_SECONDS",
              "ERP_OUTBOUND_READ_TIMEOUT_SECONDS",
              "ERP_OUTBOUND_MAX_RESPONSE_BYTES",
              "erp_proxy_tunnel_forbidden",
          )
          missing_transport = [item for item in required_transport_controls if item not in transport_source]
          assert not missing_transport, f"Odoo pinned transport controls missing: {missing_transport}"
          required_policy_controls = (
              "ERP_OUTBOUND_ALLOWED_HOSTS",
              "ERP_OUTBOUND_ALLOWED_CIDRS",
              "ERP_OUTBOUND_ALLOWED_PORTS",
              "erp_cloud_metadata_address_blocked",
              "erp_private_address_not_allowlisted",
              "erp_wildcard_allowlist_forbidden",
              "address.is_loopback",
              "address.is_link_local",
              "address.is_global",
          )
          missing_policy = [item for item in required_policy_controls if item not in policy_source]
          assert not missing_policy, f"ERP outbound policy controls missing: {missing_policy}"

          legacy_llm = Path("app/services/llm_service.py").read_text(encoding="utf-8")
          forbidden_legacy_external = (
              "_call_deepseek",
              "DEEPSEEK_API_URL",
              "api.deepseek.com",
              "urllib.request",
          )
          legacy_violations = [item for item in forbidden_legacy_external if item in legacy_llm]
          assert not legacy_violations, f"Legacy LLM external fallback returned: {legacy_violations}"
          assert "LOCAL_LLM_ENABLED" in legacy_llm
          assert "address.is_loopback" in legacy_llm
          assert "There is deliberately no external-provider fallback" in legacy_llm

          reasoner_source = Path("app/services/llm_accounting_reasoner.py").read_text(encoding="utf-8")
          assert "ExternalLLMGateway" in reasoner_source
          assert "ExternalLLMRequestContext" in reasoner_source
          assert "raw_document_text=text" in reasoner_source
          assert "db_session" in reasoner_source
          assert "get_tenant_secret" in reasoner_source
          assert "gateway.authorize()" in reasoner_source
          assert "urllib.request" not in reasoner_source
          assert "http.client" not in reasoner_source

          gateway_source = Path("app/services/external_llm_gateway.py").read_text(encoding="utf-8")
          required_gateway_controls = (
              "EXTERNAL_LLM_ENABLED",
              "ExternalLLMPolicy",
              "EXTERNAL_LLM_REQUIRED_DPA_VERSION",
              "ALLOWED_EXTERNAL_LLM_PURPOSES",
              "external_llm_disclosure_blocked",
              "external_llm_disclosure_started",
              "external_llm_disclosure_succeeded",
              "external_llm_disclosure_failed",
              "payload_hash",
              "redaction_counts",
              "raw_document_text_omitted",
              "labeled_party_or_address",
              "accounting_reference",
              "financial_value_text",
              "socket.create_connection",
              "server_hostname=self._endpoint.hostname",
              "external_llm_proxy_tunnel_forbidden",
              "EXTERNAL_LLM_MAX_REQUEST_BYTES",
              "EXTERNAL_LLM_MAX_RESPONSE_BYTES",
          )
          missing_gateway = [item for item in required_gateway_controls if item not in gateway_source]
          assert not missing_gateway, f"External LLM disclosure controls missing: {missing_gateway}"
          assert gateway_source.index("external_llm_disclosure_started") < gateway_source.index("self.transport(")

          admin_source = Path("app/api/v1/llm_admin.py").read_text(encoding="utf-8")
          assert 'require_permission("manage_settings")' in admin_source
          assert 'require_permission("view_audit_logs")' in admin_source
          assert "accept_dpa" in admin_source
          assert 'router.put("/credential")' in admin_source
          assert 'router.delete("/credential")' in admin_source
          assert "put_tenant_secret" in admin_source
          assert "ACCOUNTING_LLM_API_KEY" not in admin_source
          assert "DEEPSEEK_API_KEY" not in admin_source
          assert "api_key_prefix" not in admin_source
          assert "api_key_value" not in admin_source
          PY
      - name: Run centralized secret-store regression tests
        env:
          APP_ENV: test
          DATABASE_URL: sqlite:///./ci-secret-store-test.db
          SECRET_KEY: ci-only-secret-key-that-is-longer-than-thirty-two-characters
          SECRET_STORE_PROVIDER: memory
        run: pytest -q tests/test_secret_store_security.py tests/test_secret_store_production_config.py
      - name: Run Telegram ingestion regression tests
        env:
          APP_ENV: test
          DATABASE_URL: sqlite:///./ci-ingestion-test.db
          SECRET_KEY: ci-only-secret-key-that-is-longer-than-thirty-two-characters
          SECRET_STORE_PROVIDER: memory
        run: pytest -q tests/test_telegram_ingestion_security.py
      - name: Run ERP outbound SSRF regression tests
        env:
          APP_ENV: test
          DATABASE_URL: sqlite:///./ci-erp-outbound-test.db
          SECRET_KEY: ci-only-secret-key-that-is-longer-than-thirty-two-characters
          SECRET_STORE_PROVIDER: memory
        run: pytest -q tests/test_erp_outbound_security.py
      - name: Run external LLM disclosure regression tests
        env:
          APP_ENV: test
          DATABASE_URL: sqlite:///./ci-external-llm-test.db
          SECRET_KEY: ci-only-secret-key-that-is-longer-than-thirty-two-characters
          SECRET_STORE_PROVIDER: memory
          LOCAL_LLM_ENABLED: "false"
          EXTERNAL_LLM_ENABLED: "false"
        run: pytest -q tests/test_external_llm_security.py
      - name: Run backend tests
        env:
          APP_ENV: test
          DATABASE_URL: sqlite:///./ci-test.db
          SECRET_KEY: ci-only-secret-key-that-is-longer-than-thirty-two-characters
          SECRET_STORE_PROVIDER: memory
          LOCAL_LLM_ENABLED: "false"
          EXTERNAL_LLM_ENABLED: "false"
        run: pytest -q

  frontend-security:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: BOB-2/frontend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: BOB-2/frontend/package-lock.json
      - name: Install locked dependencies
        run: npm ci --ignore-scripts
      - name: Audit npm dependencies
        run: npm audit --audit-level=high
      - name: Build frontend with production CSP
        env:
          NEXT_PUBLIC_API_BASE_URL: https://api.example.invalid
        run: npm run build

  compose-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Validate hardened Compose configuration
        working-directory: BOB-2
        env:
          POSTGRES_PASSWORD: ci-postgres-password
          REDIS_PASSWORD: ci-redis-password
          DATABASE_URL: postgresql://guardian:ci-postgres-password@db:5432/guardianai
          REDIS_URL: redis://:ci-redis-password@redis:6379/0
          SECRET_KEY: ci-only-secret-key-that-is-longer-than-thirty-two-characters
          FRONTEND_ORIGIN: https://app.example.invalid
          TRUSTED_HOSTS: app.example.invalid,api.example.invalid
          TRUSTED_PROXY_IPS: 127.0.0.1/32
          NEXT_PUBLIC_API_BASE_URL: https://api.example.invalid
          ERP_OUTBOUND_ALLOWED_HOSTS: odoo.example.invalid
          AZURE_KEY_VAULT_URL: https://ci-guardian.vault.azure.net
        run: |
          docker compose config --quiet
          docker compose config --format json > compose.json
          python - <<'PY'
          import json
          from pathlib import Path
          from urllib.parse import urlsplit

          config = json.loads(Path("compose.json").read_text())
          services = config["services"]

          assert not services["db"].get("ports"), "PostgreSQL must not publish a host port"
          assert not services["redis"].get("ports"), "Redis must not publish a host port"
          assert not services["clamav"].get("ports"), "ClamAV must not publish a host port"
          assert config["networks"]["backend_private"].get("internal") is True

          backend_environment = services["backend"].get("environment", {})
          assert backend_environment.get("SECRET_STORE_PROVIDER") == "azure_key_vault"
          vault = urlsplit(str(backend_environment.get("AZURE_KEY_VAULT_URL", "")))
          assert vault.scheme == "https"
          assert (vault.hostname or "").endswith(".vault.azure.net")
          assert vault.path in {"", "/"} and not vault.query and not vault.fragment
          assert 1 <= int(backend_environment.get("SECRET_STORE_CONNECT_TIMEOUT_SECONDS", 0)) <= 30
          assert 1 <= int(backend_environment.get("SECRET_STORE_READ_TIMEOUT_SECONDS", 0)) <= 120
          assert 1024 <= int(backend_environment.get("SECRET_STORE_MAX_REQUEST_BYTES", 0)) <= 1048576
          assert 16384 <= int(backend_environment.get("SECRET_STORE_MAX_RESPONSE_BYTES", 0)) <= 4194304

          assert str(backend_environment.get("TELEGRAM_BOT_ENABLED", "")).lower() == "false"
          assert str(backend_environment.get("TELEGRAM_BOT_PRODUCTION_READY", "")).lower() == "false"
          assert str(backend_environment.get("TELEGRAM_ALLOW_GROUP_CHATS", "")).lower() == "false"
          assert int(backend_environment.get("TELEGRAM_RUNTIME_ORGANIZATION_ID", -1)) == 0
          approval_ttl = int(backend_environment.get("TELEGRAM_APPROVAL_TTL_SECONDS", 0))
          assert 60 <= approval_ttl <= 3600

          workers = int(backend_environment.get("TELEGRAM_INGESTION_WORKERS", 0))
          queue_size = int(backend_environment.get("TELEGRAM_INGESTION_QUEUE_SIZE", 0))
          actor_limit = int(backend_environment.get("TELEGRAM_MAX_PENDING_PER_ACTOR", 0))
          organization_limit = int(backend_environment.get("TELEGRAM_MAX_PENDING_PER_ORGANIZATION", 0))
          rate_limit = int(backend_environment.get("TELEGRAM_UPLOAD_RATE_LIMIT", 0))
          job_ttl = int(backend_environment.get("TELEGRAM_INGESTION_JOB_TTL_SECONDS", 0))
          chunk_size = int(backend_environment.get("TELEGRAM_DOWNLOAD_CHUNK_SIZE_BYTES", 0))
          api_response_limit = int(backend_environment.get("TELEGRAM_API_RESPONSE_MAX_BYTES", 0))
          assert 1 <= workers <= 8
          assert 1 <= queue_size <= 200
          assert 1 <= actor_limit <= organization_limit <= queue_size
          assert 1 <= rate_limit <= 60
          assert 30 <= job_ttl <= 1800
          assert 16384 <= chunk_size <= 1048576
          assert 65536 <= api_response_limit <= 4194304
          assert int(backend_environment.get("MAX_UPLOAD_SIZE_MB", 0)) == 10

          assert str(backend_environment.get("ERP_OUTBOUND_REQUIRE_ALLOWLIST", "")).lower() == "true"
          outbound_hosts = str(backend_environment.get("ERP_OUTBOUND_ALLOWED_HOSTS", "")).strip()
          assert outbound_hosts and outbound_hosts != "*"
          assert str(backend_environment.get("ERP_OUTBOUND_ALLOW_HTTP", "")).lower() == "false"
          outbound_ports = {
              int(item.strip())
              for item in str(backend_environment.get("ERP_OUTBOUND_ALLOWED_PORTS", "")).split(",")
              if item.strip()
          }
          assert outbound_ports and all(1 <= port <= 65535 for port in outbound_ports)
          assert 1 <= int(backend_environment.get("ERP_OUTBOUND_CONNECT_TIMEOUT_SECONDS", 0)) <= 30
          assert 1 <= int(backend_environment.get("ERP_OUTBOUND_READ_TIMEOUT_SECONDS", 0)) <= 120
          assert 65536 <= int(backend_environment.get("ERP_OUTBOUND_MAX_RESPONSE_BYTES", 0)) <= 52428800

          assert str(backend_environment.get("LOCAL_LLM_ENABLED", "")).lower() == "false"
          assert str(backend_environment.get("EXTERNAL_LLM_ENABLED", "")).lower() == "false"
          assert backend_environment.get("ACCOUNTING_LLM_API_KEY", "") == ""
          assert backend_environment.get("DEEPSEEK_API_KEY", "") == ""
          assert backend_environment.get("EXTERNAL_LLM_ALLOWED_PROVIDERS") == "deepseek"
          assert backend_environment.get("EXTERNAL_LLM_ALLOWED_MODELS") == "deepseek:deepseek-chat"
          assert backend_environment.get("EXTERNAL_LLM_ALLOWED_HOSTS") == "api.deepseek.com"
          assert int(backend_environment.get("EXTERNAL_LLM_MAX_REQUEST_BYTES", 0)) <= 1048576
          assert int(backend_environment.get("EXTERNAL_LLM_MAX_RESPONSE_BYTES", 0)) <= 4194304
          assert int(backend_environment.get("EXTERNAL_LLM_MAX_REDACTED_TEXT_CHARS", 0)) <= 8000

          def assert_loopback(service_name: str, published: str) -> None:
              ports = services[service_name].get("ports", [])
              assert len(ports) == 1, f"{service_name} must publish exactly one local port"
              port = ports[0]
              assert port.get("host_ip") == "127.0.0.1", f"{service_name} must bind to loopback"
              assert str(port.get("published")) == published

          assert_loopback("backend", "8000")
          assert_loopback("frontend", "3000")
          PY
