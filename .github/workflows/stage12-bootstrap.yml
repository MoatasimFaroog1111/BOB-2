name: Stage 12 explicit tenant refactor

on:
  push:
    branches:
      - agent/remove-legacy-tenant-rewrite

permissions:
  contents: write

concurrency:
  group: stage12-explicit-tenant-refactor
  cancel-in-progress: false

jobs:
  refactor:
    if: ${{ github.actor != 'guardian-stage12-bot' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: agent/remove-legacy-tenant-rewrite
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Apply deterministic tenant refactor and remove bootstrap
        run: python .github/stage12_refactor.py
