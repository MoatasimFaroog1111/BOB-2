name: Stage 13 immutable audit bootstrap

on:
  push:
    branches:
      - agent/immutable-audit-chain
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: stage13-immutable-audit-bootstrap
  cancel-in-progress: false

jobs:
  implement:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: agent/immutable-audit-chain
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Exclude workflow files from the one-shot app commit
        shell: bash
        run: |
          set -o pipefail
          python - <<'PY' 2>&1 | tee stage13-prepatch.log
          from pathlib import Path

          path = Path(".github/stage13_immutable_audit.py")
          lines = path.read_text(encoding="utf-8").splitlines()
          output = []
          index = 0
          while index < len(lines):
              line = lines[index]
              if "immutable-audit-chain.yml" in line and "write(REPO" in line:
                  index += 1
                  continue
              if "workflows\" / \"migrations.yml" in line and "write(REPO" in line:
                  index += 1
                  continue
              if "bootstrap = REPO" in line and "stage13-bootstrap.yml" in line:
                  index += 3
                  continue
              if line.strip() == "Path(__file__).unlink()":
                  output.extend(
                      [
                          '    bootstrap_log = REPO / "stage13-bootstrap.log"',
                          "    if bootstrap_log.exists():",
                          "        bootstrap_log.unlink()",
                      ]
                  )
              output.append(line)
              index += 1
          path.write_text("\n".join(output) + "\n", encoding="utf-8")
          PY
      - name: Apply immutable audit implementation
        shell: bash
        run: |
          set -o pipefail
          python .github/stage13_immutable_audit.py 2>&1 | tee stage13-bootstrap.log
      - name: Upload bootstrap traceback
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: stage13-bootstrap-error-${{ github.run_id }}
          path: |
            stage13-prepatch.log
            stage13-bootstrap.log
          if-no-files-found: warn
          retention-days: 3
