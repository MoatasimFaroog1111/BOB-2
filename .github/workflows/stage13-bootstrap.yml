name: Stage 13 immutable audit bootstrap

on:
  push:
    branches:
      - agent/immutable-audit-chain
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: stage13-immutable-audit-bootstrap
  cancel-in-progress: false

jobs:
  implement:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: agent/immutable-audit-chain
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Exclude workflow files from the one-shot app commit
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('.github/stage13_immutable_audit.py')
          text = path.read_text(encoding='utf-8')
          text = text.replace(
              '    write(REPO / ".github" / "workflows" / "immutable-audit-chain.yml", WORKFLOW)\n',
              '',
          )
          text = text.replace(
              '    write(REPO / ".github" / "workflows" / "migrations.yml", MIGRATION_WORKFLOW)\n',
              '',
          )
          text = text.replace(
              '    bootstrap = REPO / ".github" / "workflows" / "stage13-bootstrap.yml"\n'
              '    if bootstrap.exists():\n'
              '        bootstrap.unlink()\n',
              '',
          )
          text = text.replace(
              '    Path(__file__).unlink()\n',
              '    bootstrap_log = REPO / "stage13-bootstrap.log"\n'
              '    if bootstrap_log.exists():\n'
              '        bootstrap_log.unlink()\n'
              '    Path(__file__).unlink()\n',
          )
          path.write_text(text, encoding='utf-8')
          PY
      - name: Apply immutable audit implementation
        shell: bash
        run: |
          set -o pipefail
          python .github/stage13_immutable_audit.py 2>&1 | tee stage13-bootstrap.log
      - name: Upload bootstrap traceback
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: stage13-bootstrap-error-${{ github.run_id }}
          path: stage13-bootstrap.log
          if-no-files-found: error
          retention-days: 3
