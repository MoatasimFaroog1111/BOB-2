name: Sync dependency locks

on:
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize]
    paths:
      - "BOB-2/backend/requirements.txt"
      - "BOB-2/backend/requirements.runtime.txt"
      - ".github/workflows/sync-dependency-locks.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-locks-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  sync:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: BOB-2/backend
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref_name }}
          fetch-depth: 0
      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
          cache: pip
      - name: Generate locks with hashes
        run: |
          python -m pip install --upgrade pip pip-tools
          pip-compile --allow-unsafe --generate-hashes --output-file=requirements.lock requirements.txt
          pip-compile --allow-unsafe --generate-hashes --output-file=requirements.runtime.lock requirements.runtime.txt
      - name: Verify clean installs
        run: |
          python -m venv /tmp/guardian-full
          /tmp/guardian-full/bin/pip install --require-hashes -r requirements.lock
          /tmp/guardian-full/bin/pip check
          python -m venv /tmp/guardian-runtime
          /tmp/guardian-runtime/bin/pip install --require-hashes -r requirements.runtime.lock
          /tmp/guardian-runtime/bin/pip check
      - name: Commit synchronized locks
        run: |
          if git diff --quiet -- requirements.lock requirements.runtime.lock; then
            echo "Dependency locks already synchronized."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add requirements.lock requirements.runtime.lock
          git commit -m "build(deps): synchronize hash-locked dependencies"
          git push origin "HEAD:${{ github.event.pull_request.head.ref || github.ref_name }}"
