name: Tenant isolation

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: tenant-isolation-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  tenant-isolation:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: BOB-2/backend
    env:
      APP_ENV: test
      DATABASE_URL: sqlite:///./ci-tenant-isolation.db
      SECRET_KEY: ci-only-secret-key-that-is-longer-than-thirty-two-characters
      SECRET_STORE_PROVIDER: memory
      LOCAL_LLM_ENABLED: "false"
      EXTERNAL_LLM_ENABLED: "false"
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: BOB-2/backend/requirements.lock
      - name: Install hash-locked dependencies
        run: pip install --quiet --require-hashes -r requirements.lock
      - name: Compile tenant isolation paths
        run: >-
          python -m compileall -q
          app/security/tenant_scope.py
          app/security/dependencies.py
          app/security/encryption.py
          app/services/tenant_erp.py
          app/erp/discovery.py
          app/erp/odoo_cache.py
          app/api/v1/erp_partners.py
          scripts/check_tenant_isolation.py
          tests/test_tenant_isolation_completion.py
      - name: Enforce tenant isolation source boundaries
        run: |
          set +e
          python scripts/check_tenant_isolation.py > tenant-isolation-source.log 2>&1
          status=$?
          cat tenant-isolation-source.log
          exit "$status"
      - name: Upload source-guard failure report
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: tenant-isolation-source-failure-${{ github.run_id }}
          path: BOB-2/backend/tenant-isolation-source.log
          if-no-files-found: error
          retention-days: 3
      - name: Run multi-tenant financial regressions
        run: >-
          pytest -q
          tests/test_tenant_isolation_completion.py
          tests/test_financial_rbac.py
          tests/test_live_role_session_security.py
          tests/test_monetary_integrity.py
