version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-guardian}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-guardianai}
    volumes:
      - pgdata:/var/lib/postgresql/data
    expose:
      - "5432"
    networks:
      - backend_private
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    security_opt:
      - no-new-privileges:true

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    command: ["sh", "-c", "exec redis-server --appendonly yes --requirepass \"$$REDIS_PASSWORD\""]
    volumes:
      - redisdata:/data
    expose:
      - "6379"
    networks:
      - backend_private
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$$REDIS_PASSWORD\" ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
    security_opt:
      - no-new-privileges:true

  clamav:
    image: clamav/clamav:stable
    restart: unless-stopped
    expose:
      - "3310"
    volumes:
      - clamdata:/var/lib/clamav
    networks:
      - backend_private
    security_opt:
      - no-new-privileges:true

  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    restart: unless-stopped
    stop_grace_period: 15s
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      clamav:
        condition: service_started
    environment:
      APP_ENV: production
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required; use a URL-encoded strong password}
      REDIS_URL: ${REDIS_URL:?REDIS_URL is required; use a URL-encoded strong password}
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY is required; generate with openssl rand -hex 64}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:?FRONTEND_ORIGIN must be the public HTTPS frontend URL}
      CORS_ORIGINS: ${CORS_ORIGINS:-}
      TRUSTED_HOSTS: ${TRUSTED_HOSTS:?TRUSTED_HOSTS is required}
      TRUSTED_PROXY_IPS: ${TRUSTED_PROXY_IPS:?TRUSTED_PROXY_IPS is required}
      REQUIRE_HTTPS: "true"
      CLAMAV_HOST: clamav
      CLAMAV_PORT: "3310"
      REQUIRE_MALWARE_SCAN: "true"
      MAX_UPLOAD_SIZE_MB: "10"
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      GUARDIAN_SEED_EMAIL: ""
      GUARDIAN_SEED_PASSWORD: ""
      # Telegram remains hard-disabled until secret-store and remaining
      # production hardening stages are complete.
      TELEGRAM_BOT_ENABLED: "false"
      TELEGRAM_BOT_PRODUCTION_READY: "false"
      TELEGRAM_ALLOW_GROUP_CHATS: "false"
      TELEGRAM_APPROVAL_TTL_SECONDS: "600"
      # Fixed bounded queue and strict pre-download/stream limits.
      TELEGRAM_INGESTION_WORKERS: "2"
      TELEGRAM_INGESTION_QUEUE_SIZE: "20"
      TELEGRAM_MAX_PENDING_PER_ACTOR: "1"
      TELEGRAM_MAX_PENDING_PER_ORGANIZATION: "5"
      TELEGRAM_UPLOAD_RATE_LIMIT: "5"
      TELEGRAM_UPLOAD_RATE_WINDOW_SECONDS: "60"
      TELEGRAM_INGESTION_JOB_TTL_SECONDS: "300"
      TELEGRAM_DOWNLOAD_TIMEOUT_SECONDS: "30"
      TELEGRAM_DOWNLOAD_CHUNK_SIZE_BYTES: "65536"
      TELEGRAM_MESSAGE_MAX_AGE_SECONDS: "120"
      TELEGRAM_API_RESPONSE_MAX_BYTES: "1048576"
      # ERP/Odoo outbound destinations are exact-host/CIDR allowlisted and HTTPS-only.
      ERP_OUTBOUND_REQUIRE_ALLOWLIST: "true"
      ERP_OUTBOUND_ALLOWED_HOSTS: ${ERP_OUTBOUND_ALLOWED_HOSTS:?ERP_OUTBOUND_ALLOWED_HOSTS is required}
      ERP_OUTBOUND_ALLOWED_CIDRS: ${ERP_OUTBOUND_ALLOWED_CIDRS:-}
      ERP_OUTBOUND_ALLOWED_PORTS: ${ERP_OUTBOUND_ALLOWED_PORTS:-443}
      ERP_OUTBOUND_ALLOW_HTTP: "false"
      ERP_OUTBOUND_CONNECT_TIMEOUT_SECONDS: "10"
      ERP_OUTBOUND_READ_TIMEOUT_SECONDS: "30"
      ERP_OUTBOUND_MAX_RESPONSE_BYTES: "10485760"
    ports:
      - "${BACKEND_BIND_IP:-127.0.0.1}:${BACKEND_PORT:-8000}:8000"
    volumes:
      - storage:/app/storage
    networks:
      - backend_private
      - public
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:?NEXT_PUBLIC_API_BASE_URL must be the public HTTPS backend URL}
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:?NEXT_PUBLIC_API_BASE_URL must be the public HTTPS backend URL}
    ports:
      - "${FRONTEND_BIND_IP:-127.0.0.1}:${FRONTEND_PORT:-3000}:3000"
    networks:
      - public
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

volumes:
  pgdata:
  redisdata:
  clamdata:
  storage:

networks:
  backend_private:
    internal: true
  public:
