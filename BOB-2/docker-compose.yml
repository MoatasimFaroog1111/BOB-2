version: "3.9"

services:
  # ── PostgreSQL ─────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: guardian
      POSTGRES_PASSWORD: guardian
      POSTGRES_DB: guardianai
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U guardian -d guardianai"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend (FastAPI) ──────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_ENV: production
      DATABASE_URL: postgresql+psycopg2://guardian:guardian@db:5432/guardianai
      SECRET_KEY: ${SECRET_KEY:?Set SECRET_KEY in .env — generate with: openssl rand -hex 64}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:3000}
      CORS_ORIGINS: ${CORS_ORIGINS:-}
      TRUSTED_HOSTS: ${TRUSTED_HOSTS:-}
      REQUIRE_HTTPS: ${REQUIRE_HTTPS:-false}
      GROK_API_KEY: ${GROK_API_KEY:-}
      GUARDIAN_SEED_PASSWORD: ${GUARDIAN_SEED_PASSWORD:-}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - storage:/app/storage

  # ── Frontend (Next.js) ─────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://backend:8000}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"

volumes:
  pgdata:
  storage:
